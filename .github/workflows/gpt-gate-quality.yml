name: GPT Gate Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  gpt-gate-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependency
        run: python -m pip install pytest

      - name: Run GPT gate validator tests
        run: python -m pytest tests/test_gpt_gate_output_validator.py -q

      - name: Validate committed GPT gate valid fixtures
        run: |
          python scripts/validate_gpt_gate_output.py tests/fixtures/gpt_gate/valid/valid_task_prompt.md
          python scripts/validate_gpt_gate_output.py tests/fixtures/gpt_gate/valid/valid_pr_audit.md
          python scripts/validate_gpt_gate_output.py tests/fixtures/gpt_gate/valid/valid_pr_body.md
